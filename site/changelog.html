<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Changelog — RAVEIRC</title>
<meta name="description" content="Release history and changelog for RAVEIRC." />
<link rel="icon" href="/appicon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg: #0a0a0a; --panel: #181818; --bg2: #131313; --border: #2a2a2a;
    --fg: #ececec; --muted: #9a9a9a; --accent: #e1241f;
    --ui: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @font-face { font-family: "Inter"; src: url("/fonts/inter-400.woff2") format("woff2"); font-weight: 400; font-display: swap; }
  @font-face { font-family: "Inter"; src: url("/fonts/inter-600.woff2") format("woff2"); font-weight: 600; font-display: swap; }
  @font-face { font-family: "Inter"; src: url("/fonts/inter-700.woff2") format("woff2"); font-weight: 700; font-display: swap; }
  @font-face { font-family: "Inter"; src: url("/fonts/inter-800.woff2") format("woff2"); font-weight: 800; font-display: swap; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--ui); color: var(--fg);
    background: linear-gradient(180deg, #0e0e0e, var(--bg));
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
  header { border-bottom: 1px solid var(--border); background: rgba(10,10,10,.7); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 5; }
  .nav { display: flex; align-items: center; gap: 12px; height: 60px; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand img { width: 26px; height: 26px; border-radius: 7px; }
  .wordmark { font-weight: 800; text-transform: uppercase; letter-spacing: .5px; font-size: 17px; }
  .wordmark .irc { color: var(--accent); }
  .nav .spacer { flex: 1; }
  .nav a.back { color: var(--muted); font-weight: 600; font-size: 14px; }
  .nav a.back:hover { color: var(--fg); text-decoration: none; }
  main { padding: 36px 0 80px; }
  h1 { font-size: 30px; font-weight: 800; margin: 0 0 6px; }
  .sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }
  #md h2 {
    font-size: 19px; font-weight: 800; margin: 30px 0 10px;
    padding-top: 18px; border-top: 1px solid var(--border); color: var(--fg);
  }
  #md h2:first-of-type { border-top: none; padding-top: 0; }
  #md h3 { font-size: 15px; color: var(--muted); margin: 18px 0 8px; }
  #md ul { margin: 0 0 6px; padding-left: 22px; }
  #md li { margin: 5px 0; color: #d6d6d6; }
  #md code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; color: var(--fg); }
  #md strong { color: var(--fg); }
  .loading { color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a class="brand" href="/"><img src="/appicon.svg" alt="" /><span class="wordmark">RAVE<span class="irc">IRC</span></span></a>
    <span class="spacer"></span>
    <a class="back" href="/">← Back to home</a>
  </div>
</header>
<main>
  <div class="wrap">
    <h1>Changelog</h1>
    <p class="sub">Release history for RAVEIRC — public beta, updated often.</p>
    <div id="md"><p class="loading">Loading…</p></div>
  </div>
</main>

<script>
  // Minimal Markdown renderer for our changelog (headings, lists, inline code,
  // bold, links). Kept tiny on purpose — no dependencies.
  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function inline(s) {
    return esc(s)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }
  function render(md) {
    const out = [];
    let inList = false;
    const close = () => { if (inList) { out.push("</ul>"); inList = false; } };
    for (const raw of md.split("\n")) {
      const line = raw.replace(/\s+$/, "");
      if (/^#\s+/.test(line)) { close(); continue; } // skip the top H1 (page has its own)
      if (/^##\s+/.test(line)) { close(); out.push("<h2>" + inline(line.replace(/^##\s+/, "")) + "</h2>"); }
      else if (/^###\s+/.test(line)) { close(); out.push("<h3>" + inline(line.replace(/^###\s+/, "")) + "</h3>"); }
      else if (/^[-*]\s+/.test(line)) { if (!inList) { out.push("<ul>"); inList = true; } out.push("<li>" + inline(line.replace(/^[-*]\s+/, "")) + "</li>"); }
      else if (line.trim() === "") { close(); }
      else { close(); out.push("<p>" + inline(line) + "</p>"); }
    }
    close();
    return out.join("\n");
  }
  fetch("CHANGELOG.md", { cache: "no-cache" })
    .then((r) => (r.ok ? r.text() : Promise.reject(r.status)))
    .then((md) => { document.getElementById("md").innerHTML = render(md); })
    .catch(() => {
      document.getElementById("md").innerHTML =
        '<p class="loading">Couldn’t load the changelog. See it on <a href="https://github.com/codexv/RAVEIRCv4/blob/main/CHANGELOG.md" target="_blank" rel="noopener">GitHub</a>.</p>';
    });
</script>
</body>
</html>
