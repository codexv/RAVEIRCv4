name: Release

# Tag a version (e.g. `git tag v0.1.1 && git push --tags`) to build signed
# installers for every platform and publish them — plus the `latest.json`
# update manifest — to a GitHub Release. The in-app updater reads that manifest.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf build-essential file libssl-dev

      - name: Install dependencies
        run: npm ci

      # macOS Developer ID + notarization: only enable when the cert secret
      # exists (otherwise the empty env var makes Tauri attempt — and fail — a
      # keychain import). Exports to GITHUB_ENV so tauri-action/Tauri pick it up.
      - name: Configure macOS code signing
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret - macOS build will be unsigned."
            exit 0
          fi
          {
            echo "APPLE_CERTIFICATE<<__EOF__"; echo "$APPLE_CERTIFICATE"; echo "__EOF__"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"
          echo "macOS signing + notarization enabled."

      # Windows Authenticode signing: import the .pfx and point the bundler at it.
      # Skipped (build stays unsigned) when the secret isn't set.
      - name: Configure Windows code signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "No WINDOWS_CERTIFICATE secret - building unsigned."
            exit 0
          }
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          Remove-Item cert.pfx
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if (-not $conf.bundle.PSObject.Properties.Name.Contains("windows")) {
            $conf.bundle | Add-Member -Name windows -Value ([pscustomobject]@{}) -MemberType NoteProperty
          }
          $conf.bundle.windows | Add-Member -Name certificateThumbprint -Value $cert.Thumbprint -MemberType NoteProperty -Force
          $conf.bundle.windows | Add-Member -Name digestAlgorithm -Value "sha256" -MemberType NoteProperty -Force
          $conf.bundle.windows | Add-Member -Name timestampUrl -Value "http://timestamp.digicert.com" -MemberType NoteProperty -Force
          $conf | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Windows signing configured (thumbprint $($cert.Thumbprint))."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (configured). macOS Apple-signing env is exported by
          # the "Configure macOS code signing" step only when its secrets exist.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RAVEIRC ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. Existing installs update automatically. — What's new: https://raveirc.coders.ph/changelog.html"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
