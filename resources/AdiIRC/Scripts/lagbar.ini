n7=menu @lag.win {
n8=  &color
n9=  .&lag
n10=  ..&red:{ lag.red }
n11=  ..&blue:{ lag.blue }
n12=  ..&green:{ lag.green }
n13=  ..&yellow:{ lag.yellow }
n14=  ..&orange:{ lag.orange }
n15=  ..-
n16=  ..&custom:{ lag.custom }
n17=  .-
n18=  .&text:{ lag.stext }
n19=  .&border:{ lag.sborder }
n20=  .&background:{ lag.sface }
n21=  .-
n22=  .&default values:{ lag.defaults }
n23=  .-
n24=  &delay
n25=  .&current $+($lag.delay,s):{ lag.stime }
n26=  &style
n27=  .$iif($readini($lag.spc($script),lagstuff,style) = small,$style(1) &small,&small):{ lag.style.set small | lag.stop | lag.start }
n28=  .-
n29=  .$iif($readini($lag.spc($script),lagstuff,style) = classic,$style(1) &classic,&classic):{ lag.style.set classic | lag.stop | lag.start }
n30=  -
n31=  $iif($active ischan,&say lag):{ lag.msg }
n32=  &method
n33=  .$iif($readini($lag.spc($script),lagstuff,method) = raw,$style(1) &raw,&raw):{ lag.method.raw }
n34=  .$iif($readini($lag.spc($script),lagstuff,method) = ctcp,$style(1) &ctcp,&ctcp):{ lag.method.ctcp }
n35=  .-
n36=  .$iif($readini($lag.spc($script),lagstuff,method) = notice,$style(1) &notice,&notice):{ lag.method.notice }
n37=  $iif($version >= 6.0,&network)
n38=  .&current $lower($scid($timer(.lag.chk).cid).network):{ echo $color(info) -a *** Currently checking your lag on Network: $+($chr(2),$scid($timer(.lag.chk).cid).network,$chr(2)) Server: $+($chr(2),$scid($timer(.lag.chk).cid).server,$chr(2)) }
n39=  -
n40=  &close:{ lag.stop | echo $color(info) -a *** Stopped all lag bar functions, to turn back on type /lag.start }
n41=}
n42=alias -l lag.bar {
n43=  lag.win.size 
n44=  tbwin Attach @lag.win
n45=  var %z = $dll($_tbwin,GetTBInfo,NOT_USED),%w = $gettok(%z,1,32),%h = $gettok(%z,2,32)
n46=  lagbar.size %w %h
n47=  tbwin OnSize /lagbar.size
n48=  lag.update
n49=  window -a @lag.win
n50=}
n51=alias lag.update { if ($window(@lag.win)) { $lag.style } }
n52=alias lag.win.size { window -phB +d @lag.win 0 0 200 22 }
n53=alias lagbar.size { window @lag.win $calc($1 - 195) $int($calc(($2 - 22) / 2)) 200 22 }
n54=alias -l lag.style.set { writeini $lag.spc($script) lagstuff style $1 }
n55=alias -l lag.sface { writeini -n $lag.spc($script) lagstuff face $$input(Enter a rgb color/value for the background eg. $+($chr(36),rgb,$chr(40),face,$chr(41)),129) | $lag.style }
n56=alias -l lag.style { return $iif($readini($lag.spc($script),lagstuff,style),$+(lag.,$ifmatch),$+(lag.,classic)) }
n57=alias -l lag.face { return $iif($readini($lag.spc($script),lagstuff,face),$ifmatch,$rgb(face))) } 
n58=alias -l lag.stext {  writeini -n $lag.spc($script) lagstuff text $$input(Enter a rgb color/value for the text eg. $+($chr(36),rgb,$chr(40),text,$chr(41)),129) | $lag.style }
n59=alias -l lag.text { return $iif($readini($lag.spc($script),lagstuff,text),$ifmatch,$rgb(text))) } 
n60=alias -l lag.sborder { writeini -n $lag.spc($script) lagstuff border $$input(Enter a rgb color/value for the border eg. $+($chr(36),rgb,$chr(40),text,$chr(41)),129) | $lag.style }
n61=alias -l lag.border { return $iif($readini($lag.spc($script),lagstuff,border),$ifmatch,$rgb(text))) } 
n62=alias -l lag.defaults { remini $lag.spc($script) lagstuff face | remini $lag.spc($script) lagstuff text | remini $lag.spc($script) lagstuff border | remini $lag.spc($script) lagstuff color | $lag.style }
n63=alias -l lag.classic {
n64=  var %l = $hget(txlag,curlag),%t = Lag: $lag.isms($hget(txlag,curlag))
n65=  drawrect -nrf @lag.win $lag.face 1 0 0 200 22
n66=  drawtext -nro @lag.win $lag.text Tahoma -7 $calc(65 - $int($width(%t, Tahoma, -7))) 7 %t
n67=  drawrect -nr @lag.win $lag.border 2 83 3 105 18
n68=  drawrect -nrf @lag.win $lag.color 1 85 5 $iif(%l > 10,$iif(%l != ??,101,0),$int($calc(%l * 10.1))) 14
n69=  drawdot @lag.win
n70=}
n71=alias -l lag.small {
n72=  var %l = $hget(txlag,curlag),%t = Lag: $lag.isms($hget(txlag,curlag))
n73=  drawrect -nrf @lag.win $lag.face 1 0 0 200 22
n74=  drawtext -nr @lag.win $lag.text Tahoma -7 $int($calc((110 - $width(%t, Tahoma, -7)) / 2)) 7 %t
n75=  drawrect -nr @lag.win $lag.border 1 83 7 105 12
n76=  drawrect -nrf @lag.win $lag.color 1 85 9 $iif(%l > 10,$iif(%l != ??,101,0),$int($calc(%l * 10.1))) 8
n77=  drawdot @lag.win
n78=}
n79=alias lag.deploy { 
n80=  if ($1) { writeini -n $lag.spc($script) lagstuff text $1 }
n81=  if ($2) { writeini -n $lag.spc($script) lagstuff border $2 }
n82=  if ($3) { writeini -n $lag.spc($script) lagstuff color $3 }
n83=  if ($4) { writeini -n $lag.spc($script) lagstuff face $4 }
n84=  lag.stop
n85=  lag.start
n86=}
n87=alias lag.scheme { echo $color(info) -a *** technique lag bar scheme settings, pass this to a friend /lag.deploy $lag.text $lag.border $lag.color $lag.face }
n88=on ^*:notice:lag*:?: { 
n89=  if ($nick == $me) && ($2 isnum) && ($hget(txlag)) { 
n90=    hadd txlag curlag $calc($calc($ticks - $2) / 1000) 
n91=    lag.update
n92=    haltdef 
n93=  }
n94=  elseif (!$hget(txlag)) { 
n95=    lag.stop 
n96=    echo $color(info) -a *** Hash table error shutting down lag bar!
n97=    haltdef
n98=  }
n99=}
n100=ctcp *:lag*:?:{ 
n101=  if ($nick == $me) && ($2 isnum) && ($hget(txlag)) {
n102=    hadd txlag curlag $calc($calc($ticks - $2) / 1000)
n103=    lag.update  
n104=    halt 
n105=  }
n106=  elseif (!$hget(txlag)) { 
n107=    lag.stop 
n108=    echo $color(info) -a *** Hash table error shutting down lag bar!
n109=    halt
n110=  }
n111=}
n112=raw 421:*:{ 
n113=  if ($1 = $me) && ($2 isnum) { 
n114=    $iif($hget(txlag),hadd txlag curlag $calc($calc($ticks - $2) / 1000)) 
n115=    lag.update 
n116=  }
n117=  halt
n118=}
n119=alias lag.start {
n120=  if (!$readini($lag.spc($script),lagstuff,method)) { lag.method }
n121=  if (!$hget(txlag)) { 
n122=    hmake txlag 1 
n123=    hadd txlag curlag ?? 
n124=  } 
n125=  lag.bar 
n126=  lag.fill
n127=  lag.chk
n128=}
n129=alias lag.method { 
n130=  $iif($input(Would you like to use a notice for lag check if not press no then a ctcp will be used you can also use the raw method from popup!,8),writeini -n $lag.spc($script) lagstuff method notice,writeini $lag.spc($script) lagstuff method ctcp) 
n131=  lag.stop
n132=  $iif($server,lag.start)
n133=}
n134=alias -l _tbwin { 
n135=  if ($isfile($+($scriptdir,tbwin.dll))) {
n136=    return $lag.spc($+($scriptdir,tbwin.dll))
n137=  }
n138=  elseif ($findfile($mircdir,tbwin.dll,1)) {
n139=    return $lag.spc($ifmatch)
n140=  }
n141=  else {
n142=    lag.stop
n143=    .timer.lag.error $iif($version >= 6.0,-i) 2 5 echo $color(info) -a *** Couldn't locate tbwin.dll in your mIRC or script directory, please put tbwin.dll in your mIRC or script directory so lag bar can function!
n144=  }
n145=}
n146=alias -l lag.color { 
n147=  if ($readini($lag.spc($script),lagstuff,color)) {
n148=    return $ifmatch
n149=  }
n150=  else {
n151=    return $rgb(255,0,0)
n152=  }
n153=}
n154=alias -l lag.spc { return $+($chr(34),$1-,$chr(34)) }
n155=alias -l lag.red { writeini -n $lag.spc($script) lagstuff color $rgb(255,0,0) | lag.fill }
n156=alias -l lag.blue { writeini -n $lag.spc($script) lagstuff color $rgb(0,0,255) | lag.fill }
n157=alias -l lag.green { writeini -n $lag.spc($script) lagstuff color $rgb(12,240,30) | lag.fill }
n158=alias -l lag.yellow { writeini -n $lag.spc($script) lagstuff color $rgb(255,255,0) | lag.fill }
n159=alias -l lag.orange { writeini -n $lag.spc($script) lagstuff color $rgb(252,127,0) | lag.fill }
n160=alias -l lag.custom { writeini -n $lag.spc($script) lagstuff color $$input(Enter a custom rgb color/value which you can get by using $+($chr(36),rgb) identifier!,129) | lag.fill }
n161=alias -l tbwin { dll $_tbwin $1- }
n162=alias -l lag.chk { 
n163=  if ($readini($lag.spc($script),lagstuff,method) != raw) {
n164=    .timer.lag.chk $iif($version >= 6.0,-i) 0 $lag.delay $&
n165=      $+(lag.,$readini($lag.spc($script),lagstuff,method)) | lag.ignore.chk
n166=  } 
n167=  else { 
n168=    .timer.lag.chk $iif($version >= 6.0,-i) 0 $lag.delay $+(lag.,$readini($lag.spc($script),lagstuff,method))
n169=  }
n170=} 
n171=alias -l lag.delay { return $iif($readini($lag.spc($script),lagstuff,delay),$ifmatch,20) }
n172=alias lag.stime { 
n173=  writeini -n $lag.spc($script) lagstuff delay $$input(Delay in seconds to check lag recommended 10 or more seconds!,129)
n174=  lag.chk
n175=}
n176=alias -l lag.method.raw { writeini -n $lag.spc($script) lagstuff method raw | lag.stop | $iif($server,lag.start) }
n177=alias -l lag.method.ctcp { writeini -n $lag.spc($script) lagstuff method ctcp | lag.stop | $iif($server,lag.start) }
n178=alias -l lag.method.notice { writeini -n $lag.spc($script) lagstuff method notice | lag.stop | $iif($server,lag.start) }
n179=alias -l lag.ctcp { $iif($server,.ctcp $me lag $ticks) }
n180=alias -l lag.notice { $iif($server,.notice $me lag $ticks) }
n181=alias -l lag.raw { $iif($server,.raw $ticks) }
n182=alias -l lag.isms { if ($1 isnum) { return $+($1,s) } | else { return $1 } }
n183=alias -l lag.msg { $iif($active ischan,msg # Currently my lag is: $lag.isms($hget(txlag,curlag))) }
n184=alias lag.stop { 
n185=  $iif($window(@lag.win),window -c @lag.win)
n186=  .timer.lag.chk Off 
n187=  $iif($hget(txlag),hfree txlag)
n188=}
n189=on *:connect:{
n190=  if ($version >= 6.0) && (!$window(@lag.win)) {
n191=    lag.start
n192=  }
n193=  elseif ($version = 5.91) {
n194=    lag.start
n195=  }
n196=}
n197=on *:unload:{ lag.stop | remini $lag.spc($script) lagstuff }
n198=on *:active:*:{ if ($version >= 6.0) && ($timer(.lag.chk)) && ($activecid != $timer(.lag.chk).cid) { scid $activecid lag.chk } }
n199=on *:disconnect:{ 
n200=  if ($version >= 6.0) { 
n201=    var %s = 1,%t 
n202=    while (%s <= $scon(0)) {
n203=      $iif($scon(%s).status = connected,inc %t)
n204=      inc %s
n205=    }
n206=    $iif(!%t,lag.stop)
n207=  }
n208=  elseif ($version = 5.91) {
n209=    lag.stop 
n210=  }
n211=}
n212=alias -l lag.fill {
n213=  if ($hget(txlag)) {
n214=    var %f = 1,%g = 50,%h = $hget(txlag,curlag)
n215=    while (%f <= 10) {
n216=      $+(.timer.lag.fill,$r(1,999)) -h 1 %g hadd txlag curlag %f  
n217=      $+(.timer.lag.fill2,$r(1,9999)) -h 1 $calc(%g + 1) lag.update
n218=      inc %f
n219=      inc %g 50
n220=    }
n221=  }
n222=  if ($hget(txlag)) {
n223=    var %i = 10,%j = 500
n224=    while (%i >= 0) {
n225=      $+(.timer.lag.clr,$r(1,999)) -h 1 %j hadd txlag curlag %i 
n226=      $+(.timer.lag.clr2,$r(1,9999)) -h 1 $calc(%j + 1) lag.update
n227=      dec %i
n228=      inc %j 50
n229=    }
n230=  }
n231=  .timer.lag.restore -h 1 1000 hadd txlag curlag %h
n232=  .timer.lag.restore2 -h 1 1050 lag.update
n233=}
n234=alias -l lag.ignore.chk { 
n235=  if ($ignore($address($me,5))) && (notice isin $ignore($ifmatch).type) && ($readini($lag.spc($script),lagstuff,method) == notice) {   
n236=    .timer.lag.error2 1 5 echo $color(info) -a *** You are ignoring notice's from yourself lag bar wont work,fix then type /lag.start
n237=    lag.stop
n238=  }
n239=  elseif ($ignore($address($me,5))) && (ctcp isin $ignore($ifmatch).type) && ($readini($lag.spc($script),lagstuff,method) == ctcp) {
n240=    .timer.lag.error3 1 5 echo $color(info) -a *** You are ignoring ctcp's from yourself lag bar wont work, fix then type /lag.start
n241=    lag.stop
n242=  }
n243=  elseif ($ignore(*!*@*)) && (notice isin $ignore($ifmatch).type) && ($readini($lag.spc($script),lagstuff,method) == notice) {
n244=    .timer.lag.error4 1 5 echo $color(info) -a *** You are ignoring notice's, your lag bar wont work, fix then type /lag.start
n245=    lag.stop
n246=  }
n247=  elseif ($ignore(*!*@*)) && (ctcp isin $ignore($ifmatch).type) && ($readini($lag.spc($script),lagstuff,method) == ctcp) {
n248=    .timer.lag.error5 1 5 echo $color(info) -a *** You are ignoring ctcps, your lag bar wont work, fix then type /lag.start
n249=    lag.stop
n250=  }
n251=}
n252=
n253=
n254=[lagstuff]
n255=method=ctcp
n256=style=small
n257=
n258=;•••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••••
