n5=
n6=on 1:ban:#:{
n7=  if ($banmask iswm $address($me,5)) { 
n8=    cs unban $chan
n9=    set %chbfrom $chan
n10=    set %chbalert 1
n11=    halt
n12=  }
n13=  else { 
n14=    halt 
n15=  }
n16=}
n17=on 1:notice:*have been cleared*:?: {
n18=  if (%chbalert == 1) {
n19=    join %chbfrom
n20=    unset %chbfrom
n21=    unset %chbalert
n22=  }
n23=  else {
n24=    halt
n25=  }
n26=}
n27=
n28=menu channel,menubar,status {
n29=  -
n30=  Ban Enforcer ( %bforce )
n31=  .ON:set %bforce ON | /echo -a * Ban Enforcer is now ON! %logo
n32=  .OFF:set %bforce OFF | /echo -a * Ban Enforcer is now OFF! %logo
n33=}
n34=
n35=on @*:ban:#: {
n36=  if (%bforce == ON) { 
n37=    var %i = 1
n38=    while ($ialchan($banmask,#,%i)) { 
n39=      kick # $gettok($ifmatch,1,33) 5ř 1Banned by 4[5 $nick 4] 5ř %kicklogo 5ř 
n40=      inc %i 
n41=    } 
n42=  }
n43=}
