<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f0394b"/>
      <stop offset="0.5" stop-color="#c1121f"/>
      <stop offset="1" stop-color="#7d0c19"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="320" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0263a"/>
      <stop offset="1" stop-color="#9d0f1d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#3a050c" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Red app squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>

  <!-- White chat bubble -->
  <g filter="url(#soft)">
    <path d="M242 286
             h540 a76 76 0 0 1 76 76
             v300 a76 76 0 0 1 -76 76
             h-360
             l-120 116
             v-116
             h-60 a76 76 0 0 1 -76 -76
             v-300 a76 76 0 0 1 76 -76 z"
          fill="#ffffff"/>
  </g>

  <!-- "IRC": bold, modern, techy monospace -->
  <text x="550" y="568" text-anchor="middle"
        font-family="'SF Mono','Menlo','Roboto Mono',monospace" font-weight="700"
        font-size="250" letter-spacing="2" fill="url(#txt)">IRC</text>
</svg>
